<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="lg1" x1="0" y1="0" x2="100" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3aa6ae"/>
      <stop offset="1" stop-color="#67c0b6"/>
    </linearGradient>
    <linearGradient id="lg2" x1="100" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#4dbdcc"/>
      <stop offset="1" stop-color="#1e737a"/>
    </linearGradient>
    <linearGradient id="lg3" x1="0" y1="0" x2="0" y2="100" gradientUnits="userSpaceOnUse">
      <stop stop-color="#3aa6ae"/>
      <stop offset="1" stop-color="#1f6b70"/>
    </linearGradient>
  </defs>

  <!-- Chest body -->
  <rect x="10" y="54" width="80" height="38" rx="6" fill="url(#lg3)"/>
  <!-- Right face shadow -->
  <path d="M84 56 L84 90 Q90 90 90 84 L90 56 Z" fill="rgba(0,0,0,0.18)" rx="4"/>

  <!-- Chest lid arch -->
  <path d="M10 54 Q10 22 50 18 Q90 22 90 54 Z" fill="url(#lg2)"/>
  <!-- Lid right bevel -->
  <path d="M90 54 Q90 22 50 18 L50 21 Q87 25 87 54 Z" fill="rgba(0,0,0,0.12)"/>

  <!-- Lid facets -->
  <path d="M50 18 L76 37 L50 54 Z" fill="rgba(255,255,255,0.06)"/>
  <path d="M50 18 L24 37 L50 54 Z" fill="rgba(0,0,0,0.06)"/>

  <!-- Hinge strip -->
  <rect x="10" y="52" width="80" height="4" rx="2" fill="rgba(0,0,0,0.22)"/>

  <!-- Lock plate -->
  <rect x="40" y="57" width="20" height="16" rx="3" fill="rgba(0,0,0,0.32)"/>
  <!-- Keyhole -->
  <circle cx="50" cy="62" r="2.8" fill="rgba(0,0,0,0.5)"/>
  <rect x="48.6" y="62" width="2.8" height="6" rx="1.4" fill="rgba(0,0,0,0.5)"/>

  <!-- Crystal diamond gem on top -->
  <polygon points="50,2 64,16 50,25 36,16" fill="url(#lg1)"/>
  <polygon points="50,2 64,16 50,12" fill="rgba(255,255,255,0.38)"/>
  <polygon points="50,2 36,16 50,12" fill="rgba(255,255,255,0.18)"/>
  <polygon points="50,25 64,16 50,21" fill="rgba(0,0,0,0.14)"/>
  <polygon points="50,25 36,16 50,21" fill="rgba(0,0,0,0.06)"/>
</svg>
